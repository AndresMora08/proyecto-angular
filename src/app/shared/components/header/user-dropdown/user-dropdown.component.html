<div class="relative">
  <button (click)="toggleDropdown()" class="flex items-center text-sm font-medium text-gray-700 dark:text-gray-400 focus:outline-none">
    
    <span class="mr-2 hidden text-right lg:block">
      <span class="block text-sm font-medium text-black dark:text-white">
        {{ currentUser?.name || 'Usuario Activo' }}
      </span>
      <span class="block text-xs font-medium text-gray-500 dark:text-gray-400 capitalize">
        {{ currentUser?.role?.toLowerCase() || 'Usuario' }}
      </span>
    </span>

    <span class="h-12 w-12 rounded-full border border-gray-200 dark:border-gray-800 bg-gray-100 dark:bg-gray-800 flex items-center justify-center overflow-hidden">
      @if (currentUser?.photoUrl) {
        <img [src]="currentUser.photoUrl" alt="Avatar" class="h-full w-full object-cover">
      } @else {
        <svg class="h-6 w-6 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      }
    </span>

    <svg class="ml-2 hidden fill-current sm:block transition-transform duration-200" [ngClass]="{'rotate-180': isOpen}" width="12" height="8" viewBox="0 0 12 8" fill="none">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M0.410765 0.910734C0.736202 0.585297 1.26384 0.585297 1.58928 0.910734L6.00002 5.32148L10.4108 0.910734C10.7362 0.585297 11.2638 0.585297 11.5893 0.910734C11.9147 1.23617 11.9147 1.76381 11.5893 2.08925L6.58928 7.08925C6.26384 7.41469 5.7362 7.41469 5.41076 7.08925L0.410765 2.08925C0.0853277 1.76381 0.0853277 1.23617 0.410765 0.910734Z" />
    </svg>
  </button>

  @if (isOpen) {
    <div class="absolute right-0 mt-4 w-62.5 rounded-lg border border-gray-200 bg-white p-3 shadow-lg dark:border-gray-800 dark:bg-gray-900 z-99999">
      
      <div class="px-3 py-1.5 mb-2 border-b border-gray-100 dark:border-gray-800">
        <p class="text-xs text-gray-400 dark:text-gray-500 truncate">{{ currentUser?.email }}</p>
      </div>

      <ul class="flex flex-col gap-1 border-b border-gray-200 pb-3 dark:border-gray-800">
        <li>
          <a routerLink="/profile" (click)="closeDropdown()" class="flex w-full items-center gap-3.5 rounded-sm px-3 py-2 text-sm font-medium text-gray-700 duration-300 ease-in-out hover:bg-gray-50 hover:text-primary dark:text-gray-400 dark:hover:bg-white/[0.03]">
            Mi Perfil
          </a>
        </li>
        <li>
          <a routerLink="/pages/settings" (click)="closeDropdown()" class="flex w-full items-center gap-3.5 rounded-sm px-3 py-2 text-sm font-medium text-gray-700 duration-300 ease-in-out hover:bg-gray-50 hover:text-primary dark:text-gray-400 dark:hover:bg-white/[0.03]">
            Configuración
          </a>
        </li>
      </ul>
      
      <button (click)="onLogoutClick()" class="mt-2 flex w-full items-center gap-3.5 rounded-sm px-3 py-2 text-sm font-medium text-gray-700 duration-300 ease-in-out hover:bg-gray-50 hover:text-danger dark:text-gray-400 dark:hover:bg-white/[0.03]">
        <svg class="fill-current" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M14.1667 1.66663H5.83333C4.45262 1.66663 3.33333 2.78591 3.33333 4.16663V15.8333C3.33333 17.214 4.45262 18.3333 5.83333 18.3333H14.1667C15.5474 18.3333 16.6667 17.214 16.6667 15.8333V4.16663C16.6667 2.78591 15.5474 1.66663 14.1667 1.66663ZM15 15.8333C15 16.2923 14.6257 16.6666 14.1667 16.6666H5.83333C5.37437 16.6666 5 16.2923 5 15.8333V4.16663C5 3.70764 5.37437 3.33329 5.83333 3.33329H14.1667C14.6257 3.33329 15 3.70764 15 4.16663V15.8333Z" />
          <path d="M12.7559 9.41071L9.42258 5.66071C9.11974 5.31998 8.59279 5.28637 8.25206 5.58922C7.91133 5.89206 7.87772 6.41901 8.18057 6.75974L10.6154 9.5H1.66666C1.20772 9.5 0.833328 9.87439 0.833328 10.3333C0.833328 10.7923 1.20772 11.1666 1.66666 11.1666H10.6154L8.18057 13.9069C7.87772 14.2476 7.91133 14.7746 8.25206 15.0774C8.4184 15.2255 8.62725 15.2995 8.83533 15.2995C9.05586 15.2995 9.2751 15.2159 9.42258 15.0515L12.7559 11.3015C13.0185 11.0059 13.0185 10.5518 12.7559 10.4107V9.41071Z" />
        </svg>
        Cerrar Sesión
      </button>
    </div>
  }
</div>
