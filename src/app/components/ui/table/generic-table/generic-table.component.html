<div class="rounded-sm border border-stroke bg-white shadow-default dark:border-strokedark dark:bg-boxdark">
  <div class="max-w-full overflow-x-auto">
    <table class="w-full table-auto">

      <thead>
        <tr class="bg-gray-2 text-left dark:bg-meta-4">
          @for (col of columns; track col; let index = $index) {
            <th 
              [ngClass]="index === 0 ? 'min-w-[220px] xl:pl-11' : 'min-w-[150px]'"
              class="py-4 px-4 font-medium text-black dark:text-white"
            >
              {{ col }}
            </th>
          }
          <th class="py-4 px-4 font-medium text-black dark:text-white">
            Actions
          </th>
        </tr>
      </thead>

      <tbody>
        @for (item of data; track index; let index = $index) {
          <tr>
            
            @for (col of columns; track col; let colIndex = $index) {
              <td 
                [ngClass]="colIndex === 0 ? 'pl-9 xl:pl-11' : ''"
                class="border-b border-[#eee] py-5 px-4 dark:border-strokedark"
              >
                <p class="text-black dark:text-white">
                  {{ item[col] }}
                </p>
              </td>
            }

            <td class="border-b border-[#eee] py-5 px-4 dark:border-strokedark">
              <div class="flex items-center gap-2">
                
                @for (action of actions; track action.name) {
                  <button
                    (click)="handleAction($event, action.name, item)"
                    type="button"
                    [ngClass]="{
                      'text-red-500 hover:bg-red-100': action.name === 'delete',
                      'text-blue-500 hover:bg-blue-100': action.name === 'view',
                      'text-green-500 hover:bg-green-100': action.name === 'download'
                    }"
                    class="rounded-md border border-stroke px-2 py-1 text-xs font-medium transition hover:bg-gray-2 dark:border-strokedark"
                  >
                    {{ action.label }}
                  </button>
                }

              </div>
            </td>

          </tr>
        }
      </tbody>

    </table>
  </div>
</div>
