<div class="space-y-2">
  
  @if (label) {
    <label class="block text-sm font-medium text-black dark:text-white">
      {{ label }}
    </label>
  }

  <div class="relative">
    <input
      type="text"
      [placeholder]="placeholder"
      [ngModel]="value"
      (ngModelChange)="onInputChange($event)"
      class="w-full rounded-md border border-stroke bg-transparent py-3 pl-4 pr-10 outline-none transition focus:border-primary dark:border-strokedark dark:bg-form-input dark:text-white"
    />

    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>
    </div>
  </div>

</div>
