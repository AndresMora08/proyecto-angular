<app-auth-page-layout>
  <div class="flex flex-col justify-center w-full h-full px-4 py-8 sm:px-6 lg:w-1/2 lg:px-20 xl:px-24 bg-white dark:bg-gray-900 overflow-y-auto">
    <div class="w-full max-w-md mx-auto">
      
      <div class="mb-6 text-center lg:text-left">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white sm:text-3xl">
          Iniciar Sesión
        </h1>
        <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
          Simplifica el acceso a tus servicios ciudadanos
        </p>
      </div>

      @if (errorMessage) {
        <div class="flex items-center gap-3 p-4 mb-5 text-sm text-red-800 border border-red-200 rounded-xl bg-red-50 dark:bg-gray-800 dark:text-red-400 dark:border-red-900 animate-fade-in" role="alert">
          <svg class="flex-shrink-0 inline w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
          </svg>
          <div>
            <span class="font-semibold">Atención:</span> {{ errorMessage }}
          </div>
        </div>
      }

      @if (isLoading) {
        <div class="flex flex-col items-center justify-center py-6 text-center space-y-2">
          <div class="animate-spin rounded-full h-9 w-9 border-4 border-indigo-600 border-t-transparent"></div>
          <p class="text-xs text-gray-500 dark:text-gray-400 animate-pulse">Procesando solicitud de forma segura...</p>
        </div>
      }

      @if (!isLoading) {
        <div class="flex flex-col mb-6 space-y-3">
          <h2 class="text-xs font-semibold text-gray-400 dark:text-gray-500 mb-1 uppercase tracking-wider">
            Acceder mediante Proveedor
          </h2>
          
          <button type="button" (click)="loginWithOAuth('google')" 
            class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-gray-300 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-semibold text-sm shadow-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
            <svg class="h-5 w-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Iniciar sesión con Google
          </button>

          <button type="button" (click)="loginWithOAuth('microsoft')" 
            class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-gray-300 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-semibold text-sm shadow-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
            <svg class="h-5 w-5" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
              <path fill="#f35325" d="M0 0h11v11H0z"/>
              <path fill="#81bc06" d="M12 0h11v11H12z"/>
              <path fill="#05a6f0" d="M0 12h11v11H0z"/>
              <path fill="#ffba08" d="M12 12h11v11H12z"/>
            </svg>
            Iniciar sesión con Microsoft
          </button>

          <button type="button" (click)="loginWithOAuth('github')" 
            class="w-full flex items-center justify-center gap-3 px-4 py-2.5 rounded-xl bg-gray-900 hover:bg-gray-800 text-white font-semibold text-sm shadow-sm transition-colors dark:bg-gray-700 dark:hover:bg-gray-600">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.483 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z" />
            </svg>
            Iniciar sesión con GitHub
          </button>
          
          <div class="relative flex py-3 items-center">
            <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
            <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase tracking-wider">O mediante tu cuenta</span>
            <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
          </div>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Correo electrónico</label>
            <input type="email" formControlName="email" class="mt-1 block w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Contraseña</label>
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" class="mt-1 block w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-sm">
          </div>

          <div class="flex items-center justify-between pt-1">
            <div class="flex items-center">
              <input id="rememberMe" type="checkbox" formControlName="rememberMe" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
              <label for="rememberMe" class="ml-2 block text-sm text-gray-900 dark:text-gray-300">Recordarme</label>
            </div>
            <div class="text-sm">
              <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">¿Olvidaste tu contraseña?</a>
            </div>
          </div>

          <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
            Ingresar al Sistema
          </button>
        </form>
      }

    </div>
  </div>
</app-auth-page-layout>
