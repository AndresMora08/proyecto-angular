<div class="p-6 bg-slate-50/50 min-h-screen">
  
  <div class="flex flex-col lg:flex-row gap-6">
    
    <div class="flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm p-6 transition-all duration-300">
      
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div>
          <h2 class="text-xl font-bold text-slate-800">Comunas registradas</h2>
          <p class="text-sm text-slate-400">Consulta, crea, edita o elimina las comunas del sistema.</p>
        </div>
        <button 
          class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm rounded-xl shadow-sm transition flex items-center gap-2"
          (click)="openCreate()">
          <span class="text-base font-bold">+</span> Nueva comuna
        </button>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 items-center mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">Departamento</label>
          <select 
            [(ngModel)]="selectedDeptFilter" 
            (change)="onFilterDeptChange()"
            class="w-full bg-white border border-slate-200 text-sm rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500/20">
            <option value="">Todos los departamentos</option>
            <option *ngFor="let dept of departments" [value]="dept.id_department">{{ dept.name }}</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">Ciudad</label>
          <select 
            [(ngModel)]="selectedCityFilter"
            class="w-full bg-white border border-slate-200 text-sm rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500/20">
            <option value="">Todas las ciudades</option>
            <option *ngFor="let city of cities" [value]="city.id_city">{{ city.name }}</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">Palabra clave</label>
          <app-generic-search [(value)]="searchTerm" placeholder="Buscar comuna..."></app-generic-search>
        </div>
      </div>

      <app-generic-table 
        [columns]="tableColumns" 
        [actions]="tableActions" 
        [data]="filteredComunas"
        (onAction)="handleTableAction($event)">
      </app-generic-table>
    </div>

    <div 
      *ngIf="isFormOpen" 
      class="w-full lg:w-[400px] bg-white rounded-2xl border border-slate-200 shadow-xl p-6 relative animate-in slide-in-from-right duration-200">
      
      <button 
        (click)="closeForm()" 
        class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition text-lg font-bold">
        ✕
      </button>

      <h3 class="text-lg font-bold text-slate-800 mb-1">
        {{ formMode === 'create' ? 'Nueva comuna' : 'Editar comuna' }}
      </h3>
      <p class="text-xs text-slate-400 mb-5">Completa la información de la comuna urbana.</p>

      <div class="space-y-4">
        
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Departamento <span class="text-red-500">*</span></label>
          <select 
            [(ngModel)]="formData.id_department"
            (change)="onFormDeptChange()"
            class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20">
            <option value="" disabled selected>Selecciona un departamento...</option>
            <option *ngFor="let d of apiDepartments" [value]="d.id">{{ d.name }}</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Ciudad <span class="text-red-500">*</span></label>
          <select 
            [(ngModel)]="formData.id_city"
            [disabled]="!formData.id_department"
            class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 disabled:bg-slate-50 disabled:text-slate-400">
            <option value="" disabled selected>Selecciona una ciudad...</option>
            <option *ngFor="let c of apiCities" [value]="c.id">{{ c.name }}</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre de la comuna <span class="text-red-500">*</span></label>
          <input 
            type="text" 
            [(ngModel)]="formData.name"
            placeholder="Ej. Comuna 5 - Ciudadela del Norte"
            class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20" />
          <span class="text-[11px] text-slate-400 mt-1 block">Ingrese el nombre oficial asignado a la comuna.</span>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Estado <span class="text-red-500">*</span></label>
          <select 
            [(ngModel)]="formData.status"
            class="w-full border border-slate-200 rounded-xl p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20">
            <option value="active">Activa</option>
            <option value="inactive">Inactiva</option>
          </select>
        </div>

      </div>

      <div class="mt-6 pt-4 border-t border-slate-100 flex gap-3">
        <button 
          (click)="closeForm()"
          class="flex-1 py-2.5 border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium text-sm rounded-xl transition">
          Cancelar
        </button>
        <button 
          (click)="saveCommune()"
          class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm rounded-xl shadow-sm transition">
          Guardar comuna
        </button>
      </div>

    </div>

  </div>
</div>
