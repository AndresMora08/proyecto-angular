<div class="p-4">
  <div class="flex justify-between items-center mb-4">
    <div>
      <h2 class="text-xl font-bold text-slate-800">Ciudadanos registrados</h2>
      <p class="text-sm text-slate-500">Consulta, agrega, edita o elimina los ciudadanos del sistema.</p>
    </div>
    <button 
      *ngIf="viewMode === 'list'"
      class="px-4 py-2 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700 transition shadow-sm flex items-center gap-2" 
      (click)="showCreate()">
      <span>+</span> Nuevo ciudadano
    </button>
  </div>

  <div *ngIf="viewMode === 'list'" class="space-y-4">
    <app-generic-search 
      [(value)]="searchTerm" 
      placeholder="Buscar por nombre, correo o celular...">
    </app-generic-search>
    
    <app-generic-table 
      [columns]="tableColumns" 
      [actions]="tableActions"
      [data]="filteredCiudadanos" 
      (onAction)="handleTableAction($event)">
    </app-generic-table>
  </div>

  <div *ngIf="viewMode === 'create' || viewMode === 'edit'" class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
    <h3 class="text-lg font-semibold text-slate-800 mb-4">
      {{ viewMode === 'create' ? 'Nuevo ciudadano' : 'Modificar información del ciudadano' }}
    </h3>
    
    <app-generic-form 
      [fields]="formFields" 
      [initialValues]="selected" 
      (onSubmit)="handleFormSubmit($event)">
    </app-generic-form>
    
    <div class="mt-4 flex gap-3 border-t border-slate-100 pt-4">
      <button 
        class="px-4 py-2 rounded-lg bg-slate-100 text-slate-700 font-medium hover:bg-slate-200 transition" 
        (click)="backToList()">
        Cancelar y Volver
      </button>
    </div>
  </div>
</div>
