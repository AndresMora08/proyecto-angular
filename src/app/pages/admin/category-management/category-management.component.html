<div class="p-6 bg-slate-50 dark:bg-black min-h-screen transition-colors duration-300">
  
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start max-w-7xl mx-auto">
    
    <div [ngClass]="viewMode !== 'list' ? 'lg:col-span-8' : 'lg:col-span-12'" class="space-y-6 transition-all duration-300">
      
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 bg-white dark:bg-boxdark p-5 rounded-2xl border border-slate-200/80 dark:border-strokedark shadow-sm">
        <div class="w-full sm:max-w-md">
          <app-generic-search 
            label="Estructura de categorías"
            placeholder="Buscar categoría o subcategoría..."
            [(value)]="searchTerm"
          ></app-generic-search>
        </div>
        
        <button 
          type="button" 
          (click)="showCreateForm()"
          class="inline-flex items-center justify-center gap-2 rounded-xl bg-blue-600 py-3 px-5 font-semibold text-white hover:bg-blue-700 active:scale-95 transition-all shadow-md shadow-blue-500/10 whitespace-nowrap text-sm"
        >
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          Nueva categoría
        </button>
      </div>

      <div class="bg-white dark:bg-boxdark rounded-2xl border border-slate-200/80 dark:border-strokedark shadow-sm overflow-hidden">
        <app-generic-table 
          [columns]="tableColumns" 
          [data]="filteredCategories" 
          [actions]="tableActions"
          (onAction)="handleTableAction($event)"
        ></app-generic-table>
      </div>
    </div>

    @if (viewMode !== 'list') {
      <div class="lg:col-span-4 bg-white dark:bg-boxdark rounded-2xl border border-slate-200 dark:border-strokedark shadow-md overflow-hidden animate-fadeIn sticky top-6 transition-all duration-300">
        
        <div class="flex items-center justify-between border-b border-slate-100 dark:border-strokedark py-4 px-6 bg-slate-50/50 dark:bg-boxdark/50">
          <div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-blue-600 block mb-0.5">
              {{ viewMode === 'create' ? 'Agregar ítem' : 'Editor de módulo' }}
            </span>
            <h2 class="text-base font-bold text-slate-800 dark:text-white">
              {{ viewMode === 'create' ? 'Nueva categoría' : 'Modificar categoría' }}
            </h2>
          </div>
          
          <button 
            type="button" 
            (click)="backToList()" 
            class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 dark:hover:text-white dark:hover:bg-slate-800 transition-all"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>

        <div class="p-6">
          <p class="text-xs text-slate-500 dark:text-gray-400 mb-5 leading-relaxed">
            Completa la información detallada de la categoría o subcategoría para clasificar las problemáticas territoriales.
          </p>
          
          <div class="bg-slate-50/40 dark:bg-black/10 p-4 rounded-xl border border-slate-100/50 dark:border-strokedark/40">
            <app-generic-form
              [fields]="formFields"
              [initialValues]="selectedCategory"
              [buttonLabel]="viewMode === 'create' ? 'Guardar categoría' : 'Actualizar categoría'"
              (formSubmit)="handleFormSubmit($event)"
              (onSubmit)="handleFormSubmit($event)"
              (cancel)="backToList()"
            ></app-generic-form>
          </div>
        </div>

      </div>
    }

  </div>
</div>
