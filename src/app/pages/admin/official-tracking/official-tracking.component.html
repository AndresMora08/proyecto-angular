<div class="mx-auto max-w-[1600px] p-4 sm:p-6 lg:p-8 space-y-6">
  
  <div class="border-b border-slate-200 pb-5">
    <h2 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">
      Centro de Monitoreo Territorial
    </h2>
    <p class="mt-1 text-sm text-slate-500">
      CU-11: Supervisión interactiva y tracking de cuadrillas en tiempo real.
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-stretch">
    
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col h-[650px] overflow-hidden">
      <div class="p-4 border-b border-slate-100 bg-slate-50/50">
        <label for="entity" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">
          Filtro de Corporación / Entidad
        </label>
        <select 
          id="entity" 
          class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm transition focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none"
          (change)="onEntityChange($event)">
          <option value="">-- Todas las Entidades --</option>
          <option *ngFor="let entity of entities" [value]="entity.id_entity">
            {{ entity.name }}
          </option>
        </select>
      </div>

      <div class="flex-1 overflow-y-auto min-h-0 p-2">
        <div *ngIf="showEmptyStateMessage" class="p-8 text-center space-y-3">
          <p class="text-sm font-medium text-slate-900">No hay personal activo</p>
        </div>

        <app-generic-table
          *ngIf="!showEmptyStateMessage"
          [data]="filteredOfficials"
          [columns]="tableColumns"
          (rowClick)="onRowSelected($event)"
          class="w-full text-sm block">
        </app-generic-table>
      </div>
      
      <div class="p-3 bg-slate-50 border-t border-slate-100 text-center text-xs font-semibold text-slate-500">
        Registros: {{ filteredOfficials.length }}
      </div>
    </div>

    <div class="lg:col-span-2 relative rounded-2xl border border-slate-200 shadow-sm bg-slate-50 overflow-hidden h-[650px]">
      <div id="map" class="w-full h-full z-10"></div>
    </div>

  </div>
</div>
