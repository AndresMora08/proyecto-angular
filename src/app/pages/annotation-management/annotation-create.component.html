<div class="p-6 max-w-7xl mx-auto">
  <header class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Crear anotación</h1>
    <p class="text-gray-600">Haz clic en el mapa para agregar una anotación en el territorio.</p>
  </header>

  <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6 flex gap-4">
    <select class="border rounded p-2 text-sm"><option>Comuna</option></select>
    <select class="border rounded p-2 text-sm"><option>Barrio</option></select>
    <select class="border rounded p-2 text-sm"><option>Categoría</option></select>
    <button class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded text-sm font-medium border border-indigo-200">Filtros Avanzados</button>
  </div>

  <div class="grid grid-cols-10 gap-6">
    
    <div class="col-span-7 space-y-4">
      <div id="map-annotation" class="h-[500px] w-full rounded-xl border border-gray-200 shadow-inner"></div>
      
      <div class="bg-blue-50 p-4 rounded-lg border border-blue-200 flex justify-between items-center">
        <div>
          <span class="text-[10px] font-bold text-blue-600 block uppercase">Latitud</span>
          <span class="font-mono text-lg">{{ annotationForm.get('latitude')?.value || '0.0000' }}</span>
        </div>
        <div>
          <span class="text-[10px] font-bold text-blue-600 block uppercase">Longitud</span>
          <span class="font-mono text-lg">{{ annotationForm.get('longitude')?.value || '0.0000' }}</span>
        </div>
        <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">
          Punto seleccionado
        </div>
      </div>
    </div>

    <div class="col-span-3 bg-white p-6 rounded-lg shadow-sm border border-gray-200 h-fit">
      <form [formGroup]="annotationForm" (ngSubmit)="onSubmit()">
        <h2 class="font-bold mb-4 text-lg">Nueva anotación</h2>

        <div class="grid grid-cols-2 gap-3 mb-4">
          <div><label class="text-xs font-semibold">Latitud</label> <input formControlName="latitude" class="w-full border p-2 rounded text-sm bg-gray-50" readonly></div>
          <div><label class="text-xs font-semibold">Longitud</label> <input formControlName="longitude" class="w-full border p-2 rounded text-sm bg-gray-50" readonly></div>
        </div>

        <div class="mb-4">
          <label class="text-xs font-semibold block mb-1">Descripción</label>
          <textarea formControlName="description" class="w-full border p-2 rounded text-sm" rows="3"></textarea>
        </div>

        <div class="mb-4">
          <label class="text-xs font-semibold block mb-2">Categorías</label>
          <input type="text" placeholder="Buscar categorías..." class="w-full border p-2 rounded text-sm mb-2">
          <div class="grid grid-cols-3 gap-2">
            <button type="button" *ngFor="let cat of categories" class="text-[9px] border p-1 rounded hover:bg-indigo-50 text-center">{{cat}}</button>
          </div>
        </div>

        <div class="mb-4 border-2 border-dashed border-gray-300 p-6 text-center rounded-lg hover:border-indigo-400 cursor-pointer">
          <p class="text-xs text-gray-500">Arrastre imágenes (Máx 5)</p>
        </div>

        <div class="mb-6">
          <label class="text-xs font-semibold block mb-1">Entidades de interés</label>
          <select class="w-full border p-2 rounded text-sm">
            <option>Seleccionar entidad...</option>
          </select>
        </div>

        <div class="flex gap-2">
          <button type="button" (click)="resetMarker()" class="flex-1 border py-2 rounded text-sm hover:bg-gray-50">Cancelar</button>
          <button type="submit" class="flex-1 bg-indigo-600 text-white py-2 rounded text-sm font-bold hover:bg-indigo-700">Guardar anotación</button>
        </div>
      </form>
    </div>
  </div>

  <div class="mt-8 bg-white p-6 rounded-lg shadow-sm border border-gray-200">
    <h2 class="text-xl font-bold mb-4">Listado de anotaciones</h2>
    <app-generic-table [columns]="columns" [data]="annotations"></app-generic-table>
  </div>
</div>
