<div class="col-span-3 bg-white p-5 rounded-xl border border-gray-200 shadow-sm h-fit">
      <h3 class="text-sm font-bold text-gray-800 mb-4 pb-2 border-b">Detalles de la Anotación</h3>

      <form [formGroup]="annotationForm" (ngSubmit)="onSubmit()">
        
        <div class="mb-4">
          <label class="text-xs font-semibold block mb-1 text-gray-700">Descripción del suceso *</label>
          <textarea formControlName="description" rows="3" 
                    class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" 
                    placeholder="Describe la problemática..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
          <div>
            <label class="text-[10px] font-bold text-gray-500 block">Latitud</label>
            <input type="number" formControlName="latitude" readonly class="w-full bg-gray-50 border p-1 rounded text-xs text-gray-600 cursor-not-allowed" />
          </div>
          <div>
            <label class="text-[10px] font-bold text-gray-500 block">Longitud</label>
            <input type="number" formControlName="longitude" readonly class="w-full bg-gray-50 border p-1 rounded text-xs text-gray-600 cursor-not-allowed" />
          </div>
        </div>

        <div class="mb-4">
          <label class="text-xs font-semibold block mb-2 text-gray-700">Categorías de la problemática</label>
          <div class="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto pr-1">
            <button type="button" 
                    *ngFor="let cat of categories" 
                    (click)="toggleCategory(cat)"
                    [class.bg-indigo-600]="annotationForm.get('selectedCategories')?.value?.includes(cat)"
                    [class.text-white]="annotationForm.get('selectedCategories')?.value?.includes(cat)"
                    [class.bg-white]="!annotationForm.get('selectedCategories')?.value?.includes(cat)"
                    [class.text-gray-700]="!annotationForm.get('selectedCategories')?.value?.includes(cat)"
                    class="text-[10px] border p-2 rounded hover:bg-indigo-50 text-left transition-colors font-semibold shadow-sm truncate">
              {{ annotationForm.get('selectedCategories')?.value?.includes(cat) ? '✓ ' : '' }}{{ cat }}
            </button>
          </div>
        </div>

        <div class="mb-4 border-2 border-dashed border-gray-200 p-3 rounded-lg text-center hover:border-indigo-300 transition-colors bg-gray-50">
          <label class="cursor-pointer block">
            <span class="text-xs font-semibold text-indigo-600 block mb-1">📷 Adjuntar Evidencia</span>
            <input type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden" />
            <span class="text-[10px] text-gray-400">Selecciona una imagen del suceso</span>
          </label>
          
          <div *ngIf="selectedFiles.length > 0" class="mt-2 text-left">
            <div class="text-[10px] text-indigo-600 truncate bg-indigo-50 p-1 rounded border border-indigo-100 font-medium">
              📎 {{ selectedFiles[0].name }}
            </div>
          </div>
        </div>

        <div class="mb-6">
          <label class="text-xs font-semibold block mb-1 text-gray-700">Entidades de interés</label>
          <select formControlName="entities" class="w-full border p-2 rounded text-sm bg-white focus:ring-2 focus:ring-indigo-500">
            <option [value]="null" disabled selected>Seleccionar entidad...</option>
            <option *ngFor="let entity of entitiesList" [value]="entity.id_entity">
              {{ entity.name }}
            </option>
          </select>
        </div>

        <div class="flex gap-2">
          <button type="button" (click)="resetMarker()" class="flex-1 border py-2 rounded text-sm hover:bg-gray-50 font-medium text-gray-600">Cancelar</button>
          <button type="submit" class="flex-1 bg-indigo-600 text-white py-2 rounded text-sm font-bold hover:bg-indigo-700 shadow-md transition-all">Guardar</button>
        </div>
      </form>
    </div>
